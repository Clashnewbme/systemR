name: Build ISO

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt update && sudo apt install -y archiso

      - run: chmod +x build.sh

      - run: sudo ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: iso
          path: out/*.iso
